<!DOCTYPE html>
<html>
<head>
  <title>StudyFlow AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>StudyFlow AI Dashboard</h1>

  <section>
    <h2>Today's Tasks</h2>
    <input type="text" id="taskInput" placeholder="Enter a task">
    <button onclick="addTask()">Add Task</button>
    <ul id="taskList"></ul>
  </section>

  <section>
    <h2>Weekly Goals</h2>
    <input type="text" id="goalInput" placeholder="Enter a goal">
    <button onclick="addGoal()">Add Goal</button>
    <ul id="goalList"></ul>
  </section>

  <section>
    <h2>Progress Dashboard</h2>
    <p>Completed Tasks: <span id="completedCount">0</span></p>
    <p>Pending Tasks: <span id="pendingCount">0</span></p>
  </section>

  <section>
    <h2>AI Study Assistant</h2>
    <p>Coming soon: note summarizer, quiz generator, and flashcards.</p>
    <button>Generate Quiz</button>
    <button>Summarize Notes</button>
  </section>

  <script src="app.js"></script>
</body>
</html>
